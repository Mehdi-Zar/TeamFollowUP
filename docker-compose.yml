services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tribe}
      POSTGRES_USER: ${POSTGRES_USER:-tribe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tribe}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tribe} -d ${POSTGRES_DB:-tribe}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-tribe}
      POSTGRES_USER: ${POSTGRES_USER:-tribe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tribe}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-prod-please-32chars-min-secret}
      STALENESS_THRESHOLD_DAYS: ${STALENESS_THRESHOLD_DAYS:-7}
      SEED_DEMO: ${SEED_DEMO:-true}
      BREAKGLASS_EMAIL: ${BREAKGLASS_EMAIL:-admin@local}
      BREAKGLASS_PASSWORD: ${BREAKGLASS_PASSWORD:-}
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:8080/api/auth/oidc/callback}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid email profile}
      SAML_ENABLED: ${SAML_ENABLED:-false}
      SAML_IDP_METADATA_URL: ${SAML_IDP_METADATA_URL:-}
      SAML_IDP_METADATA_PATH: ${SAML_IDP_METADATA_PATH:-}
      SAML_SP_ENTITY_ID: ${SAML_SP_ENTITY_ID:-http://localhost:8080/api/auth/saml/metadata}
      SAML_ACS_URL: ${SAML_ACS_URL:-http://localhost:8080/api/auth/saml/acs}
      SAML_SP_CERT: ${SAML_SP_CERT:-}
      SAML_SP_KEY: ${SAML_SP_KEY:-}
    ports:
      - "${APP_PORT:-8080}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
