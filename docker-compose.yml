services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tribe}
      POSTGRES_USER: ${POSTGRES_USER:-tribe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tribe}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tribe} -d ${POSTGRES_DB:-tribe}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-tribe}
      POSTGRES_USER: ${POSTGRES_USER:-tribe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tribe}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-prod-please-32chars-min-secret}
      STALENESS_THRESHOLD_DAYS: ${STALENESS_THRESHOLD_DAYS:-7}
      SEED_DEMO: ${SEED_DEMO:-false}
      BREAKGLASS_EMAIL: ${BREAKGLASS_EMAIL:-admin@local}
      BREAKGLASS_PASSWORD: ${BREAKGLASS_PASSWORD:-}
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:8080/api/auth/oidc/callback}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid email profile}
      SAML_ENABLED: ${SAML_ENABLED:-false}
      SAML_IDP_METADATA_URL: ${SAML_IDP_METADATA_URL:-}
      SAML_IDP_METADATA_PATH: ${SAML_IDP_METADATA_PATH:-}
      SAML_SP_ENTITY_ID: ${SAML_SP_ENTITY_ID:-http://localhost:8080/api/auth/saml/metadata}
      SAML_ACS_URL: ${SAML_ACS_URL:-http://localhost:8080/api/auth/saml/acs}
      SAML_SP_CERT: ${SAML_SP_CERT:-}
      SAML_SP_KEY: ${SAML_SP_KEY:-}
      # Site is HTTPS by default, so secure cookies are appropriate.
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      LOGIN_MAX_ATTEMPTS: ${LOGIN_MAX_ATTEMPTS:-10}
      LOGIN_WINDOW_SECONDS: ${LOGIN_WINDOW_SECONDS:-300}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-0}
      PROGRESS_RETENTION_DAYS: ${PROGRESS_RETENTION_DAYS:-0}
      # --- HTTPS / TLS ---
      CERT_DIR: /app/certs
      HTTPS_PORT: 8443
      HTTP_PORT: 8080
      # Host-side HTTPS port, used to build HTTP->HTTPS redirect URLs.
      PUBLIC_HTTPS_PORT: ${APP_HTTPS_PORT:-8443}
    ports:
      # HTTPS (primary) and HTTP (301 -> HTTPS).
      - "${APP_HTTPS_PORT:-8443}:8443"
      - "${APP_HTTP_PORT:-8080}:8080"
    volumes:
      # Active cert/key materialised here at boot (DB stays the source of truth).
      - certs_data:/app/certs
    healthcheck:
      test: ["CMD", "curl", "-fsSk", "https://localhost:8443/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Automated daily logical backups (pg_dump) with rotation. Opt-in profile so it
  # only runs when requested:  docker compose --profile backup up -d
  backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-tribe}
      PGDATABASE: ${POSTGRES_DB:-tribe}
      PGPASSWORD: ${POSTGRES_PASSWORD:-tribe}
      BACKUP_KEEP: ${BACKUP_KEEP:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - ./backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[backup] sidecar started";
        while true; do
          ts=$$(date +%Y%m%d_%H%M%S);
          if pg_dump > /backups/tribe_$$ts.sql; then echo "[backup] tribe_$$ts.sql ok"; else echo "[backup] FAILED"; fi;
          ls -1t /backups/*.sql 2>/dev/null | tail -n +$$((BACKUP_KEEP+1)) | xargs -r rm -f;
          sleep $$BACKUP_INTERVAL_SECONDS;
        done

volumes:
  db_data:
  certs_data:
